name: verify

# Both verification layers on every push/PR: the Lean kernel checks all
# theorems (Layer 1), and the vendored gates check the proofs are non-vacuous
# and that no proposal claim outruns a proof (Layer 2). The artefact is the CI.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan + Lean (pin from lean/lean-toolchain)
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sha256sum elan-init.sh
          sh elan-init.sh -y --default-toolchain "$(cat lean/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Run full verification harness (both layers)
        run: ./verify.sh
